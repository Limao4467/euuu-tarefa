<body>
    <style>
        img{
            animation: bubuli 0.5s ease-in-out;
            animation-fill-mode: forwards;
        }
        @keyframes bubuli 
    {
        from {
            transform:skew(7deg)
        }
        to {
            transform: skew(20deg);
           
        }
    }
    </style>
    <img src="cuki.jpg" alt="a">
</body>
